AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: JdaSense Serverless Backend (FastAPI + AI Inference)

Globals:
  Function:
    Timeout: 120 # Increased from 30
    MemorySize: 2048 # Increased from 1024
    Environment:
      Variables:
        S3_BUCKET: !Ref RecordingsBucket
        DYNAMODB_TABLE: !Ref PredictionsTable
        USERS_TABLE: !Ref UsersTable
        AUDIT_TABLE: !Ref AuditTable
        NUMBA_CACHE_DIR: /tmp # Added to fix librosa/numba caching error
  Api:
    Auth:
      ApiKeyRequired: true
    BinaryMediaTypes:
      - "*~1*" # This is the SAM syntax for */* to allow all binary types

Resources:
  JdaSenseApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures:
        - x86_64
      Events:
        ProxyApiRoot:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        ProxyApiGreedy:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
      Policies:
        - S3WritePolicy:
            BucketName: !Ref RecordingsBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditTable
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: .
      DockerTag: v1

  RecordingsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: jdasense-recordings

  PredictionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: jdasense-predictions
      AttributeDefinitions:
        - AttributeName: record_id
          AttributeType: S
      KeySchema:
        - AttributeName: record_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: jdasense-users
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  AuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: jdasense-audit
      AttributeDefinitions:
        - AttributeName: log_id
          AttributeType: S
      KeySchema:
        - AttributeName: log_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  JdaSenseApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Enabled: true
      # Name removed to allow AWS to generate a unique ID

  JdaSenseUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      ApiStages:
        - ApiId: !Ref ServerlessRestApi
          Stage: Prod
      UsagePlanName: JdaSenseUsagePlan

  JdaSenseUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref JdaSenseApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref JdaSenseUsagePlan

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL for JdaSense"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  ApiKey:
    Description: "API Key for the mobile app"
    Value: !Ref JdaSenseApiKey
